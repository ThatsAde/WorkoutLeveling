<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Workout Leveling — Sistema Attivato</title>
  <meta name="theme-color" content="#0a0e17" />
  <meta name="description" content="Sistema di allenamento stile Solo Leveling" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout Leveling" />

  <!-- Google Fonts: Orbitron + Rajdhani for system text -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js" defer></script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/charts.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/cursor.css" />
  <link rel="stylesheet" href="css/animations.css" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none' stroke='%2300e5ff' stroke-width='2'><path d='M16 2 L28 10 L24 28 L8 28 L4 10 Z'/><circle cx='16' cy='16' r='3' fill='%2300e5ff'/></svg>" />
</head>
<body>
  <div class="cursor-ring" id="cursor-ring" aria-hidden="true"></div>
  <div class="cursor-dot" id="cursor-dot" aria-hidden="true"></div>
  <aside class="sidebar"></aside>
  <main class="main" id="main-content">
    <div class="loading system-text">Inizializzazione sistema...</div>
  </main>

  <script src="dist/bundle.js" defer></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
